version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: livenote_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-livenote}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: livenote_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      # Use the Docker internal hostname `db` to connect to Postgres
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-livenote}
      JWT_SECRET: ${JWT_SECRET:-please_change_this_to_a_secure_random_string}
      NODE_ENV: production
      PORT: 3000

volumes:
  pgdata:
